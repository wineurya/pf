<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" fill="none" aria-hidden="true">
  <defs>
    <linearGradient
      id="favicon-grad"
      x1="0"
      y1="0"
      x2="12"
      y2="12"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="28%" stop-color="#0d9488" />
      <stop offset="52%" stop-color="#7c3aed" />
      <stop offset="78%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <!-- Eight true rectangles on radial spokes (loader); hollow center -->
  <g fill="url(#favicon-grad)">
    <g transform="translate(6 6) rotate(0)">
      <rect x="-0.675" y="-5.5" width="1.35" height="3" />
    </g>
    <g transform="translate(6 6) rotate(45)">
      <rect x="-0.675" y="-5.5" width="1.35" height="3" />
    </g>
    <g transform="translate(6 6) rotate(90)">
      <rect x="-0.675" y="-5.5" width="1.35" height="3" />
    </g>
    <g transform="translate(6 6) rotate(135)">
      <rect x="-0.675" y="-5.5" width="1.35" height="3" />
    </g>
    <g transform="translate(6 6) rotate(180)">
      <rect x="-0.675" y="-5.5" width="1.35" height="3" />
    </g>
    <g transform="translate(6 6) rotate(225)">
      <rect x="-0.675" y="-5.5" width="1.35" height="3" />
    </g>
    <g transform="translate(6 6) rotate(270)">
      <rect x="-0.675" y="-5.5" width="1.35" height="3" />
    </g>
    <g transform="translate(6 6) rotate(315)">
      <rect x="-0.675" y="-5.5" width="1.35" height="3" />
    </g>
  </g>
</svg>
